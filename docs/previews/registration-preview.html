<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Registration Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f2f6ff, #ece7ff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      color: #203044;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(29, 43, 70, 0.12);
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }
    p {
      margin: 0 0 24px;
      color: #5a6b82;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .field {
      margin-bottom: 16px;
    }
    .field.full {
      grid-column: 1 / -1;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 7px;
      color: #44546a;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input, textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d8e0eb;
      border-radius: 12px;
      background: #fbfcfe;
      font-size: 15px;
    }
    textarea {
      min-height: 120px;
      resize: none;
    }
    .btn {
      margin-top: 10px;
      display: inline-block;
      background: #6a0572;
      color: white;
      border-radius: 12px;
      padding: 14px 20px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Vendor Registration Form</h1>
    <p>Capture vendor identity, contact details, certifications, and performance rating in a procurement-friendly workflow.</p>
    <div class="grid">
      <div class="field">
        <label>Vendor Name</label>
        <input value="Prime Supply Co.">
      </div>
      <div class="field">
        <label>Contact Email</label>
        <input value="procurement@primesupply.com">
      </div>
      <div class="field full">
        <label>Compliance Certifications</label>
        <textarea>ISO 9001
Safety Compliance
Approved Procurement Vendor</textarea>
      </div>
      <div class="field">
        <label>Performance Rating</label>
        <input value="4.7 / 5.0">
      </div>
    </div>
    <div class="btn">Register Vendor</div>
  </div>
</body>
</html>
